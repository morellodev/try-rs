name: Prepare release

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Test & Lint"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz:
    name: Release PR
    if: >-
      (github.event_name == 'workflow_dispatch'
      || (github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'))
      && !startsWith(github.event.workflow_run.head_commit.message || github.event.head_commit.message || '', 'chore: release')
      && !contains(github.event.workflow_run.head_commit.message || github.event.head_commit.message || '', 'release-plz-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag:
    name: Tag release
    if: >-
      github.event_name == 'push'
      && (startsWith(github.event.head_commit.message, 'chore: release')
      || contains(github.event.head_commit.message, 'release-plz-'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: MarcoIeni/release-plz-action@v0.5
        id: release-plz
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger release workflow
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          for tag in $(echo "$RELEASES" | jq -r '.[].tag'); do
            gh workflow run release.yml --ref "$tag"
          done
